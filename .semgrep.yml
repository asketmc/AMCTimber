rules:
  - id: amctimber-no-process-exec
    message: AMCTimber should not spawn OS processes from plugin runtime code.
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: Runtime.getRuntime().exec(...)
      - pattern: new ProcessBuilder(...)

  - id: amctimber-no-native-library-load
    message: AMCTimber should not load native libraries.
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: System.load(...)
      - pattern: System.loadLibrary(...)

  - id: amctimber-no-url-classloader
    message: AMCTimber should not load remote or nested code at runtime.
    severity: ERROR
    languages: [java]
    pattern: new URLClassLoader(...)

  - id: amctimber-no-reflection-escape
    message: AMCTimber should not use hidden reflection escape hatches.
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: $X.setAccessible(true)
      - pattern: $C.defineClass(...)

  - id: amctimber-no-runtime-network
    message: AMCTimber should not open network connections from runtime code.
    severity: ERROR
    languages: [java]
    pattern-either:
      - pattern: new Socket(...)
      - pattern: $X.openConnection(...)
      - pattern: $X.openStream(...)
      - pattern: HttpClient.newHttpClient(...)
