version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Compatibility baseline dependencies are pinned intentionally. Updating them
      # needs a manual PR with Paper 1.20.x -> 1.21.x runtime evidence.
      - dependency-name: "io.papermc.paper:paper-api"
      - dependency-name: "com.palmergames.bukkit.towny:towny"
      - dependency-name: "org.joml:joml"
      - dependency-name: "com.sk89q.worldguard:worldguard-bukkit"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
