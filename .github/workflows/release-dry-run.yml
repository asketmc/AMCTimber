name: Release Dry Run

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Check release security policy
        run: |
          python3 scripts/check-release-security.py
          python3 scripts/test-release-version.py
      - name: Build jar
        run: mvn -B -ntp clean verify
      - name: Prepare release assets without upload or signing
        run: |
          set -euo pipefail
          version="$(bash scripts/verify-release-version.sh)"
          bash scripts/prepare-release-assets.sh "$version" release-dry-run
          test -f "release-dry-run/AMCTimber-${version}.jar"
          test -f release-dry-run/SHA256SUMS.txt
          test -f release-dry-run/sbom.spdx.json
          test -f release-dry-run/sbom.cdx.json
          test -f release-dry-run/jar-safety-report.txt
      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dry-run
          path: release-dry-run/
          if-no-files-found: error
