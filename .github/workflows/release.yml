name: Release Security

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build release jar
        run: mvn -B -ntp clean verify
      - name: Prepare release artifacts
        run: bash scripts/prepare-release-assets.sh "${GITHUB_REF_NAME#v}" release
      - name: Smoke exact release jar on Paper 1.20.6
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          jar="release/AMCTimber-${version}.jar"
          bash scripts/smoke-paper.sh 1.20.6 "$jar" release-smoke/1.20.6
          expected="$(sha256sum "$jar" | awk '{print $1}')"
          grep -Fx "plugin_sha256=${expected}" release-smoke/1.20.6/smoke-summary.txt
      - name: Smoke exact release jar on latest stable Paper 1.21
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          jar="release/AMCTimber-${version}.jar"
          bash scripts/smoke-paper.sh latest-1.21 "$jar" release-smoke/latest-1.21
          expected="$(sha256sum "$jar" | awk '{print $1}')"
          grep -Fx "plugin_sha256=${expected}" release-smoke/latest-1.21/smoke-summary.txt
      - name: Upload exact-jar runtime smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-runtime-smoke-${{ github.event.release.tag_name }}
          path: release-smoke/
          if-no-files-found: ignore
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          artifacts=(
            "release/AMCTimber-${version}.jar"
            "release/SHA256SUMS.txt"
            "release/sbom.spdx.json"
            "release/sbom.cdx.json"
            "release/jar-safety-report.txt"
          )
          for artifact in "${artifacts[@]}"; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          assets=(
            "release/AMCTimber-${version}.jar"
            "release/AMCTimber-${version}.jar.sigstore.json"
            "release/SHA256SUMS.txt"
            "release/SHA256SUMS.txt.sigstore.json"
            "release/sbom.spdx.json"
            "release/sbom.spdx.json.sigstore.json"
            "release/sbom.cdx.json"
            "release/sbom.cdx.json.sigstore.json"
            "release/jar-safety-report.txt"
            "release/jar-safety-report.txt.sigstore.json"
          )
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}"
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release/AMCTimber-*.jar
            release/SHA256SUMS.txt
            release/sbom.spdx.json
            release/sbom.cdx.json
            release/jar-safety-report.txt
