name: Release

# Tag a release to publish automatically:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MODRINTH_TOKEN  — a Modrinth API token with write access (https://modrinth.com/settings/pats)
#   MODRINTH_ID     — your Modrinth project id or slug (e.g. "amctimber")
# GITHUB_TOKEN is provided automatically and is used to attach the jar to a GitHub Release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        run: mvn -B -ntp clean package
      - name: Publish to Modrinth + GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}

          files: target/AMCTimber-*.jar
          name: AMCTimber ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          java: '21'

          loaders: |
            paper
            purpur
            folia
          # Adjust this list as new Minecraft versions release; mc-publish validates it against Modrinth.
          game-versions: |
            1.20.6
            1.21
            1.21.1
            1.21.3
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.10
            1.21.11
          game-version-filter: releases

          dependencies: |
            worldguard(optional)
            towny(optional)
