name: Release Security

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build release jar
        run: mvn -B -ntp clean verify
      - name: Prepare release artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          jar="target/AMCTimber-${version}.jar"
          test -f "$jar"
          mkdir -p release
          cp "$jar" "release/AMCTimber-${version}.jar"
          bash scripts/check-release-jar.sh "release/AMCTimber-${version}.jar" release/jar-safety-report.txt
      - name: SPDX SBOM
        env:
          SYFT_VERSION: "1.42.3"
        run: |
          set -euo pipefail
          archive="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 \
            -o "$archive" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 \
            -o syft_checksums.txt "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          grep " ${archive}$" syft_checksums.txt > syft.sha256
          sha256sum -c syft.sha256
          tar -xzf "$archive" syft
          version="${GITHUB_REF_NAME#v}"
          ./syft "release/AMCTimber-${version}.jar" -o spdx-json=release/sbom.spdx.json
      - name: CycloneDX SBOM
        run: |
          set -euo pipefail
          mvn -B -ntp -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DoutputDirectory=release \
            -DoutputName=sbom \
            -DoutputFormat=json
          mv release/sbom.json release/sbom.cdx.json
          test -f release/sbom.cdx.json
      - name: Create checksums
        run: |
          set -euo pipefail
          (cd release && sha256sum *.jar sbom.*.json jar-safety-report.txt > SHA256SUMS.txt)
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts
        run: |
          set -euo pipefail
          for artifact in release/*; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release/* --clobber
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: "release/*"
