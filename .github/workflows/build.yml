name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Maven verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify
        run: mvn -B -ntp clean verify
      - name: Check release jar safety
        run: bash scripts/check-release-jar.sh target/AMCTimber-*.jar target/jar-safety-report.txt
      - name: Upload jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: AMCTimber-jar
          path: |
            target/AMCTimber-*.jar
            target/jar-safety-report.txt
          if-no-files-found: error
