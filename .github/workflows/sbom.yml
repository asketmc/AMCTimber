# SPDX-License-Identifier: GPL-3.0-only

name: SBOM

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build jar for SBOM context
        run: mvn -B -ntp -DskipTests package
      - name: SPDX SBOM
        env:
          SYFT_VERSION: "1.42.3"
        run: |
          set -euo pipefail
          archive="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 \
            -o "$archive" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --show-error --silent \
            --retry 5 --retry-all-errors --retry-delay 5 \
            -o syft_checksums.txt "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          grep " ${archive}$" syft_checksums.txt > syft.sha256
          sha256sum -c syft.sha256
          tar -xzf "$archive" syft
          jar="$(find target -maxdepth 1 -name 'AMCTimber-*.jar' -print -quit)"
          test -n "$jar"
          ./syft "$jar" -o spdx-json=sbom.spdx.json
      - name: CycloneDX SBOM
        run: |
          set -euo pipefail
          mvn -B -ntp -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DoutputDirectory=. \
            -DoutputName=sbom \
            -DoutputFormat=json
          mv sbom.json sbom.cdx.json
          test -f sbom.cdx.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
