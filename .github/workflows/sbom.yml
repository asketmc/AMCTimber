# SPDX-License-Identifier: GPL-3.0-only

name: SBOM

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build jar for SBOM context
        run: mvn -B -ntp -DskipTests package
      - name: SPDX SBOM
        run: |
          set -euo pipefail
          mvn -B -ntp -DskipTests org.spdx:spdx-maven-plugin:1.0.4:createSPDX
          cp target/site/com.asketmc_amctimber-*.spdx.json sbom.spdx.json
          test -s sbom.spdx.json
      - name: CycloneDX SBOM
        run: |
          set -euo pipefail
          mvn -B -ntp -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DoutputDirectory=. \
            -DoutputName=sbom \
            -DoutputFormat=json
          mv sbom.json sbom.cdx.json
          test -f sbom.cdx.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
