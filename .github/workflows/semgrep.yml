# SPDX-License-Identifier: GPL-3.0-only

name: Semgrep

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "53 2 * * 2"

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Semgrep
        run: |
          python3 -m pip install --user semgrep==1.168.0
          "$HOME/.local/bin/semgrep" scan --config .semgrep.yml --sarif --output semgrep.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: semgrep.sarif
