# SPDX-License-Identifier: GPL-3.0-only

name: Semgrep

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "53 2 * * 2"

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run Semgrep
        run: |
          python3 -m pip install --user semgrep==1.168.0
          "$HOME/.local/bin/semgrep" scan --config .semgrep.yml --sarif --output semgrep.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif
